# Terminal-Bench（tb run）会注入 T_BENCH_* 环境变量；必须让「客户端」容器名与 harness 一致，否则会 404。
# 本地直接 docker compose 时未设置变量则用默认值。
services:
  main:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${T_BENCH_TASK_DOCKER_CLIENT_IMAGE_NAME:-access-control-tbench-main}
    container_name: ${T_BENCH_TASK_DOCKER_CLIENT_CONTAINER_NAME:-access-control-tbench-main-local}
    depends_on:
      spicedb:
        condition: service_started
    volumes:
      - rbac-data:/data
    working_dir: /app
    # TB 会在容器内用 tmux/exec 跑 oracle；入口若是一次性 bash solve.sh，脚本结束容器即退出，exec 会 409。
    # 保持常驻；由 tb --agent oracle 在容器内执行 solution（见 task 配置）。
    command: [ "sh", "-c", "sleep infinity" ]

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - main
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  spicedb-migrate:
    image: authzed/spicedb:v1.49.2
    command:
      - datastore
      - migrate
      - head
      - --datastore-engine
      - postgres
      - --datastore-conn-uri
      - postgres://postgres:postgres@postgres:5432/spicedb?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  spicedb:
    image: authzed/spicedb:v1.49.2
    command:
      - serve
      - --http-enabled
      - --grpc-preshared-key
      - devtoken
      - --datastore-engine
      - postgres
      - --datastore-conn-uri
      - postgres://postgres:postgres@postgres:5432/spicedb?sslmode=disable
      - --http-addr
      - 0.0.0.0:8443
    depends_on:
      postgres:
        condition: service_healthy
      spicedb-migrate:
        condition: service_completed_successfully

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spicedb
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d spicedb
      interval: 2s
      timeout: 3s
      retries: 20
volumes:
  rbac-data:
